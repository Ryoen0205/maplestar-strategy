
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .editor-root { display: flex; flex-direction: column; height: 640px; font-family: monospace; background: #1a1a2e; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  .top-bar { background: #16213e; padding: 8px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
  .top-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r{background:#ff5f57}.dot-y{background:#ffbd2e}.dot-g{background:#28c840}
  .top-bar .title { color: #8892b0; font-size: 12px; font-family: sans-serif; margin-left: 6px; }
  .btn-run { background: linear-gradient(180deg,#f0c840,#c89010); border: 2px solid #8B6914; border-radius: 4px; color: #3a2000; font-size: 12px; font-weight: 700; padding: 3px 12px; cursor: pointer; font-family: inherit; margin-left: auto; }
  .btn-run:hover { background: linear-gradient(180deg,#ffd850,#e0a820); }
  .split { display: flex; flex: 1; overflow: hidden; }
  .pane { display: flex; flex-direction: column; width: 50%; overflow: hidden; }
  .pane-title { background: #0f3460; color: #64ffda; font-size: 11px; font-weight: 700; padding: 5px 12px; letter-spacing: 1px; flex-shrink: 0; font-family: sans-serif; }
  .divider { width: 4px; background: #0f3460; cursor: col-resize; flex-shrink: 0; }
  .divider:hover { background: #64ffda; }
  .code-area { flex: 1; background: #0d1117; color: #c9d1d9; font-size: 12px; line-height: 1.6; padding: 12px; resize: none; border: none; outline: none; font-family: 'Consolas','Courier New',monospace; overflow-y: auto; tab-size: 2; white-space: pre; word-break: normal; overflow-wrap: normal; }
  .preview-frame { flex: 1; background: #fff; border: none; width: 100%; }
  .line-nums { background: #0d1117; color: #484f58; font-size: 12px; line-height: 1.6; padding: 12px 6px 12px 2px; text-align: right; user-select: none; overflow: hidden; font-family: monospace; flex-shrink: 0; width: 32px; border-right: 1px solid #21262d; }
  .editor-row { display: flex; flex: 1; overflow: hidden; }
  .status-bar { background: #0f3460; color: #8892b0; font-size: 10px; padding: 3px 12px; display: flex; gap: 16px; flex-shrink: 0; font-family: sans-serif; }
  .status-ok { color: #64ffda; }
</style>

<div class="editor-root">
  <div class="top-bar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <span class="title">🍄 maplestory_monster.html — 使用 &lt;img&gt; 顯示怪物圖片</span>
    <button class="btn-run" onclick="runCode()">▶ 套用更新</button>
  </div>
  <div class="split">
    <div class="pane">
      <div class="pane-title">📝 HTML 原始碼</div>
      <div class="editor-row">
        <div class="line-nums" id="line-nums"></div>
        <textarea class="code-area" id="code-editor" spellcheck="false" oninput="updateLines()"></textarea>
      </div>
      <div class="status-bar">
        <span id="char-count">字元：0</span>
        <span id="line-count">行數：0</span>
        <span class="status-ok">● HTML</span>
      </div>
    </div>
    <div class="divider" id="divider"></div>
    <div class="pane">
      <div class="pane-title">🌐 瀏覽器預覽</div>
      <iframe class="preview-frame" id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>
</div>

<script>
const defaultHTML = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<title>怪物百科</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; }
.ms-wrap {
  background: linear-gradient(180deg,#a8d8f0 0%,#c5e8f7 30%,#d4f0c8 60%,#8bc34a 75%,#6d9e2e 80%,#795548 85%,#8d6e63 100%);
  min-height: 100vh; padding: 12px;
}
.panel {
  background: rgba(240,220,160,0.95);
  border: 3px solid #8B6914; border-radius: 4px;
  max-width: 680px; margin: 0 auto;
  box-shadow: 4px 4px 0 #5a3e0a;
}
.panel-title {
  background: linear-gradient(90deg,#6b3a0a,#9b5a1a,#6b3a0a);
  color: #ffd700; font-size: 15px; font-weight: 700;
  padding: 6px 14px; border-bottom: 2px solid #8B6914;
  text-shadow: 1px 1px 2px #000;
}
.panel-title span { color: #ffa040; }
.search-bar {
  padding: 8px 10px; background: rgba(255,240,180,0.6);
  border-bottom: 2px solid #c8961a; display: flex; gap: 6px; flex-wrap: wrap;
}
.search-bar input {
  background: #fff8e8; border: 2px solid #a0700a;
  border-radius: 3px; padding: 3px 8px; font-size: 12px;
  font-family: inherit; color: #3a2000; flex: 1; outline: none;
}
.ms-btn {
  background: linear-gradient(180deg,#f0c840,#c89010);
  border: 2px solid #8B6914; border-radius: 3px;
  color: #3a2000; font-size: 12px; font-weight: 700;
  padding: 3px 10px; cursor: pointer; font-family: inherit;
}
.filter-row {
  padding: 6px 10px; background: rgba(255,235,160,0.5);
  border-bottom: 2px solid #c8961a; display: flex; gap: 5px; flex-wrap: wrap;
}
.tab-btn {
  background: linear-gradient(180deg,#d4a840,#a07010);
  border: 2px solid #8B6914; border-radius: 3px;
  color: #fff8d0; font-size: 11px; font-weight: 700;
  padding: 3px 8px; cursor: pointer; font-family: inherit;
  text-shadow: 1px 1px 1px #000;
}
.tab-btn.active {
  background: linear-gradient(180deg,#ff8c00,#cc5500);
  border-color: #ff4400; color: #fff;
}
.monster-list {
  padding: 8px; display: flex; flex-direction: column;
  gap: 6px; max-height: 460px; overflow-y: auto;
}
.monster-card {
  background: rgba(255,248,210,0.9);
  border: 2px solid #b8921a; border-radius: 3px;
  padding: 8px 10px; display: flex; gap: 10px;
}
.monster-sprite {
  width: 52px; height: 52px;
  border: 2px solid #a07810; border-radius: 3px;
  background: rgba(200,240,200,0.5);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
}
/* 怪物圖片樣式 */
.monster-sprite img {
  width: 100%; height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}
/* 圖片載入失敗時顯示替代文字 */
.monster-sprite img::after {
  content: attr(alt);
  font-size: 10px; color: #907040;
  display: flex; align-items: center; justify-content: center;
}
.monster-info { flex: 1; }
.monster-name {
  font-size: 14px; font-weight: 700; color: #3a0000;
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.lv-badge {
  background: linear-gradient(180deg,#e84040,#a00000);
  border: 1px solid #700000; border-radius: 3px;
  color: #fff; font-size: 10px; padding: 1px 5px;
}
.resist-tags { display: flex; gap: 3px; flex-wrap: wrap; margin: 3px 0; }
.rtag { font-size: 10px; font-weight: 700; border: 1.5px solid; border-radius: 2px; padding: 0 4px; line-height: 16px; }
.rtag.walk   { background:#d0f0e0; color:#007030; border-color:#009040; }
.rtag.ice    { background:#c0e8ff; color:#003880; border-color:#0060c0; }
.rtag.stun   { background:#e0d0ff; color:#400080; border-color:#6020b0; }
.rtag.thunder{ background:#fff0a0; color:#805000; border-color:#c08000; }
.rtag.fire   { background:#ffd0b0; color:#801000; border-color:#d04000; }
.rtag.lit    { background:#d0ffd0; color:#006000; border-color:#00a000; }
.rtag.holy   { background:#fff8c0; color:#806000; border-color:#c0a000; }
.rtag.dark   { background:#3a2060; color:#e0d0ff; border-color:#7050a0; }
.rtag.seal   { background:#f0c0e0; color:#600040; border-color:#a06080; }
.stat-divider { border-top: 1px dashed #c8961a; margin: 4px 0; }
.monster-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px 6px; }
.stat-item { font-size: 11px; display: flex; gap: 3px; }
.stat-label { color: #907040; }
.stat-val { font-weight: 700; color: #3a1000; }
.drop-label { font-size: 10px; color: #604020; }
.drop-coin { color: #c08000; font-weight: 700; }
.drop-exp  { color: #0060a0; font-weight: 700; }
</style>
</head>
<body>
<div class="ms-wrap">
  <div class="panel">
    <div class="panel-title">👾 怪物 / <span>#怪物等級1~20</span></div>
    <div class="search-bar">
      <input id="si" placeholder="搜尋關鍵字" oninput="f()"/>
      <button class="ms-btn" onclick="f()">🔍 搜尋</button>
    </div>
    <div class="filter-row">
      <button class="tab-btn">其他怪物</button>
      <button class="tab-btn">Boss 王級怪物</button>
      <button class="tab-btn active">等級 1~20</button>
      <button class="tab-btn">等級 21~40</button>
      <button class="tab-btn">等級 41~60</button>
    </div>
    <div class="monster-list" id="ml"></div>
  </div>
</div>
<script>
// ✏️ 將 img 欄位改成你的圖片檔名或完整網址
// 範例：img: "snail.png"  →  會渲染成 <img src="images/snail.png">
// 若使用完整網址可直接填入，例如 img: "https://example.com/snail.png"
const IMAGE_BASE = ""; // 📁 圖片資料夾前綴，可依需求修改

const M = [
  { name:"嫩寶",        lv:1,  img:"Snail.webp",        hp:8,   mp:0,   g:"4~6",   xp:3,  pa:22,  ma:"-", pd:"-", md:"-",  ac:20, ev:"-", sp:-65, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"藍寶",        lv:2,  img:"BlueSnail.webp",   hp:15,  mp:15,  g:"8~12",  xp:4,  pa:27,  ma:"-", pd:"-", md:"-",  ac:20, ev:"-", sp:-50, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"菇菇仔",      lv:2,  img:"Spore.webp",     hp:20,  mp:15,  g:"8~12",  xp:5,  pa:32,  ma:"-", pd:"-", md:"-",  ac:30, ev:"-", sp:-30, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"紅寶",        lv:4,  img:"RedSnail.webp",    hp:40,  mp:30,  g:"12~18", xp:8,  pa:35,  ma:"-", pd:3,   md:10,   ac:30, ev:"-", sp:-50, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"菇菇寶貝",    lv:5,  img:"OrangeMushroom.webp",  hp:60,  mp:30,  g:"15~25", xp:12, pa:42,  ma:"-", pd:5,   md:5,    ac:35, ev:"-", sp:-20, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"綠水靈",      lv:6,  img:"slime.png",        hp:80,  mp:50,  g:"18~30", xp:16, pa:48,  ma:5,   pd:10,  md:10,   ac:40, ev:"5", sp:-15, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"肥肥",        lv:10, img:"pig.png",          hp:160, mp:0,   g:"25~40", xp:30, pa:70,  ma:"-", pd:20,  md:10,   ac:50, ev:"-", sp:10,  kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
  { name:"石頭人",      lv:18, img:"stone_golem.png",  hp:520, mp:150, g:"45~80", xp:90, pa:115, ma:20,  pd:50,  md:40,   ac:75, ev:"-", sp:-25, kn:"-", r:["walk","ice","stun","thunder","fire","lit","holy","dark","seal"] },
];

const RL = { walk:"走", ice:"冰", stun:"庫", thunder:"雷", fire:"火", lit:"畫", holy:"聖", dark:"暗", seal:"封" };

// 將 img 欄位轉成 <img> 標籤
// 若 img 已是完整網址（http開頭）則直接使用，否則加上 IMAGE_BASE 前綴
function imgTag(m) {
  const src = m.img.startsWith("http") ? m.img : IMAGE_BASE + m.img;
  return \`<img src="\${src}" alt="\${m.name}" title="\${m.name}"
    onerror="this.style.display='none';this.parentNode.dataset.fb=m.name">\`;
}

function f() {
  const t = document.getElementById("si").value.toLowerCase();
  const d = t ? M.filter(m => m.name.includes(t)) : M;
  document.getElementById("ml").innerHTML = d.map(m => \`
    <div class="monster-card">
      <div class="monster-sprite">\${imgTag(m)}</div>
      <div class="monster-info">
        <div class="monster-name">
          \${m.name}
          <span class="lv-badge">Lv \${m.lv}</span>
        </div>
        <div class="resist-tags">\${m.r.map(r => \`<span class="rtag \${r}">\${RL[r]}</span>\`).join("")}</div>
        <div class="drop-label">
          HP：<b>\${m.hp}</b> MP：<b>\${m.mp}</b>
          <span class="drop-coin"> 💰 \${m.g}</span>
          <span class="drop-exp"> ✨ \${m.xp} exp</span>
        </div>
        <div class="stat-divider"></div>
        <div class="monster-stats">
          <div class="stat-item"><span class="stat-label">物攻</span><span class="stat-val">\${m.pa}</span></div>
          <div class="stat-item"><span class="stat-label">魔攻</span><span class="stat-val">\${m.ma}</span></div>
          <div class="stat-item"><span class="stat-label">物防</span><span class="stat-val">\${m.pd}</span></div>
          <div class="stat-item"><span class="stat-label">魔防</span><span class="stat-val">\${m.md}</span></div>
          <div class="stat-item"><span class="stat-label">命中</span><span class="stat-val">\${m.ac}</span></div>
          <div class="stat-item"><span class="stat-label">迴避</span><span class="stat-val">\${m.ev}</span></div>
          <div class="stat-item"><span class="stat-label">移速</span><span class="stat-val">\${m.sp}</span></div>
          <div class="stat-item"><span class="stat-label">擊退</span><span class="stat-val">\${m.kn}</span></div>
        </div>
      </div>
    </div>\`).join("");
}
f();
<\/script>
</body>
</html>`;

const editor = document.getElementById("code-editor");
const preview = document.getElementById("preview-frame");
const lineNums = document.getElementById("line-nums");

editor.value = defaultHTML;

function updateLines() {
  const lines = editor.value.split("\n");
  lineNums.innerHTML = lines.map((_,i) => `<div>${i+1}</div>`).join("");
  document.getElementById("char-count").textContent = `字元：${editor.value.length}`;
  document.getElementById("line-count").textContent = `行數：${lines.length}`;
  lineNums.scrollTop = editor.scrollTop;
}

editor.addEventListener("scroll", () => { lineNums.scrollTop = editor.scrollTop; });
editor.addEventListener("keydown", e => {
  if (e.key === "Tab") {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0,s) + "  " + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updateLines();
  }
});

function runCode() {
  const doc = preview.contentDocument || preview.contentWindow.document;
  doc.open(); doc.write(editor.value); doc.close();
  const btn = document.querySelector(".btn-run");
  btn.textContent = "✓ 已更新";
  setTimeout(() => { btn.textContent = "▶ 套用更新"; }, 1500);
}

updateLines();
runCode();

const divider = document.getElementById("divider");
const split = divider.parentElement;
let dragging = false, startX = 0, leftW = 0;
divider.addEventListener("mousedown", e => {
  dragging = true; startX = e.clientX;
  leftW = divider.previousElementSibling.getBoundingClientRect().width;
  document.body.style.cursor = "col-resize";
  document.body.style.userSelect = "none";
});
document.addEventListener("mousemove", e => {
  if (!dragging) return;
  const dx = e.clientX - startX;
  const total = split.getBoundingClientRect().width - 4;
  const nw = Math.max(200, Math.min(total - 200, leftW + dx));
  divider.previousElementSibling.style.cssText += `;width:${nw}px;flex:none`;
  divider.nextElementSibling.style.cssText += `;width:${total-nw}px;flex:none`;
});
document.addEventListener("mouseup", () => {
  dragging = false;
  document.body.style.cursor = "";
  document.body.style.userSelect = "";
});
</script>
